<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<rect width="1200" height="720" fill="#f7f3ea"/>
<rect x="20" y="20" width="1160" height="680" fill="none" stroke="#ddd2c2" stroke-width="1.5"/>
<text x="58" y="70" fill="#2b2620" font-size="34" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="58" dy="0">OpenClaw 的控制平面长什么样</tspan></text>
<text x="60" y="106" fill="#5f5952" font-size="18" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="60" dy="0">它不是一个聊天壳子，而是一个 Gateway 把消息面、控制面、节点与工具统一收口</tspan></text>
<rect x="70" y="170" width="260" height="120" rx="18" fill="#dfeafe" stroke="#4678d4" stroke-width="2.2"/>
<text x="100" y="214" fill="#2b2620" font-size="26" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="100" dy="0">消息渠道</tspan></text>
<text x="100" y="248" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="100" dy="0">WhatsApp / Telegram / Slack /</tspan><tspan x="100" dy="20">Discord / Signal / WebChat</tspan></text>

<rect x="410" y="160" width="380" height="180" rx="18" fill="#e7f5ea" stroke="#3e9b60" stroke-width="2.2"/>
<text x="452" y="214" fill="#2b2620" font-size="30" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="452" dy="0">Gateway</tspan></text>
<text x="452" y="248" fill="#5f5952" font-size="17" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="452" dy="0">控制平面单一真源：</tspan><tspan x="452" dy="22">sessions / presence / config / tools / hooks</tspan></text>
<text x="452" y="304" fill="#2b2620" font-size="18" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="452" dy="0">WS + HTTP 同端口复用</tspan></text>

<rect x="870" y="170" width="250" height="110" rx="18" fill="#fff1e1" stroke="#d48836" stroke-width="2.2"/>
<text x="902" y="212" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="902" dy="0">Control UI / 节点</tspan></text>
<text x="902" y="246" fill="#5f5952" font-size="15" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="902" dy="0">Web 控制台 / iOS / Android / macOS</tspan></text>

<rect x="180" y="440" width="250" height="110" rx="18" fill="#efe7ff" stroke="#8663d6" stroke-width="2.2"/>
<text x="210" y="482" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="210" dy="0">Skills / 插件</tspan></text>
<text x="210" y="516" fill="#5f5952" font-size="15" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="210" dy="0">bundled / managed / workspace</tspan></text>

<rect x="500" y="440" width="240" height="110" rx="18" fill="#fdeaf0" stroke="#c95e7b" stroke-width="2.2"/>
<text x="532" y="482" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="532" dy="0">Memory</tspan></text>
<text x="532" y="516" fill="#5f5952" font-size="15" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="532" dy="0">真源文件 + 可重建索引</tspan></text>

<rect x="810" y="440" width="250" height="110" rx="18" fill="#dfeafe" stroke="#4678d4" stroke-width="2.2"/>
<text x="842" y="482" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="842" dy="0">运维面</tspan></text>
<text x="842" y="516" fill="#5f5952" font-size="15" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="842" dy="0">config reload / logs / pairing</tspan></text>

