<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<rect width="1200" height="720" fill="#f7f3ea"/>
<rect x="20" y="20" width="1160" height="680" fill="none" stroke="#ddd2c2" stroke-width="1.5"/>
<text x="58" y="70" fill="#2b2620" font-size="34" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="58" dy="0">~/.openclaw 里哪些是“真源”</tspan></text>
<text x="60" y="106" fill="#5f5952" font-size="18" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="60" dy="0">排障和备份时，优先级最高的是配置、会话转录、工作区记忆和设备配对信息</tspan></text>
<rect x="90" y="170" width="320" height="140" rx="18" fill="#dfeafe" stroke="#4678d4" stroke-width="2.2"/>
<text x="120" y="214" fill="#2b2620" font-size="26" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="120" dy="0">配置层</tspan></text>
<text x="120" y="248" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="120" dy="0">openclaw.json / config.json</tspan><tspan x="120" dy="20">迁移与兼容先看这里</tspan></text>

<rect x="450" y="170" width="320" height="140" rx="18" fill="#e7f5ea" stroke="#3e9b60" stroke-width="2.2"/>
<text x="480" y="214" fill="#2b2620" font-size="26" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="480" dy="0">会话与工作区</tspan></text>
<text x="480" y="248" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="480" dy="0">agents/main/sessions</tspan><tspan x="480" dy="20">workspace/memory / AGENTS.md</tspan></text>

<rect x="810" y="170" width="300" height="140" rx="18" fill="#fff1e1" stroke="#d48836" stroke-width="2.2"/>
<text x="842" y="214" fill="#2b2620" font-size="26" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="842" dy="0">配对与定时任务</tspan></text>
<text x="842" y="248" fill="#5f5952" font-size="15" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="842" dy="0">devices / cron</tspan><tspan x="842" dy="20">远程 UI、节点与自动任务都看这里</tspan></text>

<rect x="240" y="430" width="300" height="120" rx="18" fill="#efe7ff" stroke="#8663d6" stroke-width="2.2"/>
<text x="272" y="472" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="272" dy="0">可重建层</tspan></text>
<text x="272" y="506" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="272" dy="0">memory/main.sqlite</tspan><tspan x="272" dy="20">索引坏了可以重建</tspan></text>

<rect x="660" y="430" width="300" height="120" rx="18" fill="#fdeaf0" stroke="#c95e7b" stroke-width="2.2"/>
<text x="692" y="472" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="692" dy="0">排障顺序</tspan></text>
<text x="692" y="506" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="692" dy="0">先看配置 -&gt; 再看日志 -&gt;</tspan><tspan x="692" dy="20">再还原 sessions / memory</tspan></text>

