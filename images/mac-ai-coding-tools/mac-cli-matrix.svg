<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<rect width="1200" height="720" fill="#f7f3ea"/>
<rect x="20" y="20" width="1160" height="680" fill="none" stroke="#ddd2c2" stroke-width="1.5"/>
<text x="58" y="70" fill="#2b2620" font-size="34" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="58" dy="0">AI 编码场景下，工具到底各管什么</tspan></text>
<text x="60" y="106" fill="#5f5952" font-size="18" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="60" dy="0">不要把所有问题都交给一个终端插件；更稳的方式是按问题类型选工具</tspan></text>
<rect x="90" y="180" width="220" height="90" rx="18" fill="#dfeafe" stroke="#4678d4" stroke-width="2.2"/>
<text x="120" y="220" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="120" dy="0">文件定位</tspan></text>
<text x="120" y="250" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="120" dy="0">fzf / Yazi</tspan></text>

<rect x="350" y="180" width="220" height="90" rx="18" fill="#e7f5ea" stroke="#3e9b60" stroke-width="2.2"/>
<text x="380" y="220" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="380" dy="0">会话管理</tspan></text>
<text x="380" y="250" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="380" dy="0">Tmux</tspan></text>

<rect x="610" y="180" width="220" height="90" rx="18" fill="#fff1e1" stroke="#d48836" stroke-width="2.2"/>
<text x="640" y="220" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="640" dy="0">运行时所有权</tspan></text>
<text x="640" y="250" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="640" dy="0">mise</tspan></text>

<rect x="870" y="180" width="220" height="90" rx="18" fill="#efe7ff" stroke="#8663d6" stroke-width="2.2"/>
<text x="900" y="220" fill="#2b2620" font-size="24" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="900" dy="0">终端体验</tspan></text>
<text x="900" y="250" fill="#5f5952" font-size="16" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="900" dy="0">Ghostty / zsh</tspan></text>

<rect x="120" y="360" width="960" height="210" rx="18" fill="#fdeaf0" stroke="#c95e7b" stroke-width="2.2"/>
<text x="156" y="408" fill="#2b2620" font-size="28" font-weight="700" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="156" dy="0">一个很实际的判断标准</tspan></text>
<text x="156" y="446" fill="#5f5952" font-size="18" font-weight="500" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="156" dy="0">如果某个工具同时在管 prompt、插件、历史、目录跳转、Node、Ruby、会话和文件浏览，</tspan><tspan x="156" dy="24">那它大概率已经不是“顺手”，而是在替你隐藏复杂度。</tspan></text>
<text x="156" y="516" fill="#2b2620" font-size="18" font-weight="600" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"><tspan x="156" dy="0">更稳的做法是：一类问题对应一层工具，出了问题就知道去哪个模块查。</tspan></text>
</svg>
