<text x="60" y="106" fill="#5a544c" font-size="18" font-weight="500" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"><tspan x="60" dy="0">如果今天要做一个更稳的 Coding Agent，最值得优先补的不是功能数量，而是这四个基础设施</tspan></text>


