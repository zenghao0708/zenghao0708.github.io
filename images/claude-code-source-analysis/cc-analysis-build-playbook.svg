<text x="134" y="242" fill="#5a544c" font-size="14" font-weight="500" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"><tspan x="134" dy="0">先抽 session lifecycle，</tspan><tspan x="134" dy="18">再谈 REPL、SDK、headless。</tspan></text>

